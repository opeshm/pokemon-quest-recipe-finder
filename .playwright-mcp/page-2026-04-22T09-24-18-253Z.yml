    - main [ref=e789]:
      - paragraph [ref=e790]:
        - generic [ref=e792]: Pokémon List
      - paragraph [ref=e793]:
        - text: Like all Pokémon games, Pokémon Quest has got a selection of Pokémon within it. These are obtained by creating
        - link "Dishes while Cooking" [ref=e794] [cursor=pointer]:
          - /url: cooking.shtml
        - text: and then evolving when suitable. This page lists all the available Pokémon and how you get them. Click the Pokémon to go to full details about them
      - paragraph [ref=e795]: Like the main games, Pokémon of the same species are never the same. They have IVs, in this case providing a stat point between 0 and 100, but with the maximum possible IV varying depending on the cooking pot.
