<header class="app-header">
  <div class="app-header-inner">
    <div class="brand-mark">
      <span class="brand-kicker">PokeQuest Studio</span>
    </div>

    <nav class="primary-nav" aria-label="Primary navigation">
      <a
        routerLink="/"
        routerLinkActive="active"
        [routerLinkActiveOptions]="{ exact: true }"
        >Recipes</a
      >
      <a routerLink="/moves" routerLinkActive="active">Moves</a>
      <a routerLink="/pokedex" routerLinkActive="active">Pokedex</a>
    </nav>
  </div>
</header>

<router-outlet></router-outlet>

<footer class="app-footer">
  <div class="app-footer-inner">
    <span>PokeQuest Studio</span>
    <a routerLink="/privacy">Privacy Policy</a>
  </div>
</footer>

<app-pokemon-profile-modal></app-pokemon-profile-modal>
