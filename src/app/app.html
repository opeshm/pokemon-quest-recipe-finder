<header class="app-header">
  <div class="app-header-inner">
    <div class="brand-mark">
      <span class="brand-kicker">PokeQuest Studio</span>
    </div>

    <nav class="primary-nav" aria-label="Primary navigation">
      <button
        type="button"
        class="nav-burger"
        [attr.aria-expanded]="mobileMenuOpen()"
        aria-controls="primary-nav-links"
        (click)="toggleMobileMenu()"
      >
        @if (!mobileMenuOpen()) {
          <svg viewBox="0 0 24 24" fill="currentColor" width="24" height="24" aria-hidden="true">
            <path d="M3 18h18v-2H3v2zm0-5h18v-2H3v2zm0-7v2h18V6H3z"/>
          </svg>
        } @else {
          <svg viewBox="0 0 24 24" fill="currentColor" width="24" height="24" aria-hidden="true">
            <path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/>
          </svg>
        }
      </button>

      <div id="primary-nav-links" class="primary-nav-links" [class.primary-nav-links--open]="mobileMenuOpen()">
        <a
          routerLink="/"
          routerLinkActive="active"
          [routerLinkActiveOptions]="{ exact: true }"
          (click)="closeMobileMenu()"
        >{{ 'app.nav.pokedex' | translate }}</a>
        <a routerLink="/moves" routerLinkActive="active" (click)="closeMobileMenu()">{{ 'app.nav.moves' | translate }}</a>
        <a routerLink="/recipes" routerLinkActive="active" (click)="closeMobileMenu()">{{ 'app.nav.recipes' | translate }}</a>
      </div>
    </nav>

    <label class="language-selector">
      <span>{{ 'app.nav.language' | translate }}</span>
      <select [value]="language()" (change)="setLanguage($any($event.target).value)">
        @for (option of languageOptions; track trackByLanguage($index, option)) {
          <option [value]="option.value">{{ option.label }}</option>
        }
      </select>
    </label>
  </div>
</header>

<router-outlet></router-outlet>

<footer class="app-footer">
  <div class="app-footer-inner">
    <span>PokeQuest Studio</span>
    <a routerLink="/privacy">{{ 'app.footer.privacy' | translate }}</a>
    <a class="donate-btn" href="https://paypal.me/opeshm" target="_blank" rel="noopener">
      <img src="assets/paypal-svgrepo-com.svg" alt="PayPal" width="16" height="16" aria-hidden="true" />
      {{ 'app.footer.donate' | translate }}
    </a>
  </div>
</footer>

<app-pokemon-profile-modal></app-pokemon-profile-modal>
